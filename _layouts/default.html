<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang }}">
<head>
  {%- include head.html -%}
</head>
<body>
  {%- include header.html -%}

  <main class="site-main">
    <div class="container {% if page.wide %}container--wide{% endif %}">
      {{ content }}
    </div>
  </main>

  {%- include footer.html -%}

  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
  {% if page.search %}
    <script src="{{ '/assets/js/filter.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/simple-jekyll-search.min.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
  {% endif %}
</body>
</html>
