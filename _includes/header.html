{%- assign i18n = site.data.i18n -%}

<header class="site-header">
  <div class="container container--wide site-header__inner">
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title }}">
      <span class="site-logo__dot" aria-hidden="true"></span>
      <span>{{ site.title }}</span>
    </a>

    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}">{{ i18n.nav.home }}</a>
      <a href="{{ '/tags/' | relative_url }}">{{ i18n.nav.tags }}</a>
      <a href="{{ '/archive/' | relative_url }}">{{ i18n.nav.archive }}</a>
    </nav>

    <div class="site-actions">
      <button type="button" class="icon-btn theme-toggle" aria-label="{{ i18n.actions.toggle_theme }}">
        <svg class="icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
</header>
