{%- assign i18n = site.data.i18n -%}

<footer class="site-footer">
  <div class="container container--wide site-footer__inner">
    <div>&copy; {{ 'now' | date: '%Y' }} {{ site.author.name }}. {{ i18n.footer.rights }}</div>
    <div>
      {% if site.social.github %}
        <a href="https://github.com/{{ site.social.github }}" target="_blank" rel="noopener" aria-label="GitHub">GitHub</a>
      {% endif %}
      <span style="margin: 0 0.5rem; color: var(--border-strong);">·</span>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </div>
  </div>
</footer>
